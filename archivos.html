<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <title>Archivos - Geolocalización</title>
    <style>
        html {
            color-scheme: light dark;
        }
    </style>

    <script src="js/registraServiceWorker.js"></script>

    <meta name="viewport" content="width=device-width">
    <meta name="theme-color" content="#fffbfe">
    <link rel="icon" sizes="32x32" href="favicon.ico">
    <link rel="manifest" href="site.webmanifest">
    <script src="ungap/custom-elements.js"></script>

    <script type="module" src="js/configura.js"></script>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/transicion_pestanas.css">
    <link rel="expect" blocking="render" href="js/nav-tab-fixed.js">

</head>

<body>

    <md-top-app-bar adicional="tab" headline="headline">

        <h1>Archivos y Cámara</h1>

    </md-top-app-bar>

    <h1>Archivos y Cámara</h1>

    <nav-tab-fixed id="tab"></nav-tab-fixed>

    <main>
        <p>
            Esta página se usa para archivos.
        </p>
        <p>
            <label class="md-filled-text-field" for="fotoMovil">
                <span>Foto de Móvil *</span>
                <input type="file" id="fotoMovil" class="md-input" accept="image/*" capture="camera">
                <small>Obligatorio</small>
            </label>
            
        </p>
        <p>
            <label class="md-filled-text-field" for="videoMovil">
                <span>Video de Móvil *</span>
                <input type="file" id="videoMovil" class="md-input" accept="video/*" capture="">
                <small>Obligatorio</small>
            </label>
            
        </p>
        <p>
            <label class="md-filled-text-field" for="archivoInput">
                <span>Archivo *</span>
                <input type="file" id="archivoInput" class="md-input">
                <small>Obligatorio</small>
            </label>
            
        </p>
    </main>

</body>

</html>
