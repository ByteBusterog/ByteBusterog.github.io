<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <title>GPS</title>
    <style>
        html {
            color-scheme: light dark;
        }
    </style>

    <script src="js/registraServiceWorker.js"></script>

    <meta name="viewport" content="width=device-width">
    <meta name="theme-color" content="#fffbfe">
    <link rel="icon" sizes="32x32" href="favicon.ico">
    <link rel="manifest" href="site.webmanifest">
    <script src="ungap/custom-elements.js"></script>

    <script type="module" src="js/configura.js"></script>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/transicion_pestanas.css">
    <link rel="expect" blocking="render" href="#navtabfixed">

</head>

<body>

    <md-top-app-bar adicional="tab" headline="headline">

        <h1>Geolocalización</h1>

    </md-top-app-bar>

    <h1>Geolocalización</h1>

    <nav-tab-fixed id="tab"></nav-tab-fixed>

    <main>
        <p>
            Esta página se usa para Geolocalización.
        </p><br>
        <h1>GPS</h1>
        <p>
            <label>
                Latitud
                <output id="latitud"></output>
            </label>
        </p>
        <br>
        <p>
            <label>
                Longitud
                <output id="longitud"></output>
            </label>
        </p>
        <script>
            navigator.geolocation.
                watchPosition(p => {
                    latitud.value =
                        p.coords.latitude
                    longitud.value =
                        p.coords.longitude
                });
        </script>
    </main>

</body>

</html>
